# pytest 설정 파일입니다.
#
# 실행 위치:
#   cd C:\aidev\02_supabase-ai-backend\99_final-backend-project\solution
#   python -m pytest tests
#
# 이 파일이 있으면 pytest가 테스트 파일을 찾는 기준을 명확하게 알 수 있습니다.

[pytest]
testpaths = tests
python_files = test_*.py
python_functions = test_*
# 라이브러리 내부 deprecation warning은 수업 테스트 출력에서 숨깁니다.
# 테스트 실패가 아니라 의존성 버전 경고이므로, 초보자 실습에서는 통과/실패 결과에 집중합니다.
filterwarnings =
    ignore:.*httpx.*starlette\.testclient.*deprecated.*:Warning
    ignore:.*gotrue.*deprecated.*:DeprecationWarning