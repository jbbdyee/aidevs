services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "8000:8000"
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "8801:8801"
    command: streamlit run frontend/app.py --server.port 8801 --server.address 0.0.0.0
    depends_on:
      - backend

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    command: python -m worker.main
    depends_on:
      - backend

  monitor:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "8802:8802"
    command: streamlit run monitor/app.py --server.port 8802 --server.address 0.0.0.0
    depends_on:
      - backend
