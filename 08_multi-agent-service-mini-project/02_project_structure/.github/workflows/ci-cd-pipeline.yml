name: auto-healing-ci-cd

on:
  push:
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest backend/tests

      - name: Prepare local env file
        run: cp .env.example .env

      - name: Validate Docker Compose
        run: docker compose -f docker/docker-compose.yml config

      - name: Build Docker image
        run: docker build -f docker/Dockerfile -t auto-healing-workflow .

      - name: Deployment note
        run: |
          echo "AWS 배포 단계는 팀 프로젝트 환경에 맞게 ECR/App Runner/ECS 명령으로 확장합니다."
