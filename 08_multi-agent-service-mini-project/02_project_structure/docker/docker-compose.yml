services:
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    env_file:
      - ../.env
    command: python -m uvicorn backend.app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    env_file:
      - ../.env
    command: streamlit run frontend/app.py --server.address 0.0.0.0 --server.port 8801
    ports:
      - "8801:8801"
    depends_on:
      - backend

  monitor:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    env_file:
      - ../.env
    command: streamlit run monitor/app.py --server.address 0.0.0.0 --server.port 8802
    ports:
      - "8802:8802"
    depends_on:
      - backend

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    env_file:
      - ../.env
    command: python worker/main.py
    depends_on:
      - backend
